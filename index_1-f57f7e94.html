<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>整數加減練習</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "微軟正黑體", "PingFang TC", "Noto Sans TC", sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .logo {
    max-width: 100%;
    height: auto;
    border-radius: 12px;
    margin-bottom: 16px;
  }
  .card {
    background: #ffffff;
    border-radius: 20px;
    padding: 32px 28px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    text-align: center;
  }
  h1 {
    font-size: 22px;
    color: #1e3c72;
    margin: 0 0 4px;
  }
  .sub {
    color: #666;
    font-size: 13px;
    margin-bottom: 20px;
  }
  .streak-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #f0f3fa;
    border-radius: 12px;
    padding: 10px 16px;
    margin-bottom: 22px;
  }
  .streak-label { font-size: 13px; color: #555; }
  .streak-num { font-size: 26px; font-weight: 700; color: #2a5298; }
  .streak-num span { font-size: 14px; color: #999; font-weight: 400; }
  .progress-track {
    background: #e2e8f5;
    height: 10px;
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 26px;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4facfe, #00f2fe);
    transition: width 0.3s ease;
  }
  .question {
    font-size: 44px;
    font-weight: 700;
    color: #1e3c72;
    letter-spacing: 2px;
    margin-bottom: 22px;
    min-height: 56px;
  }
  input[type="text"] {
    width: 140px;
    font-size: 28px;
    text-align: center;
    padding: 10px;
    border: 3px solid #cdd8ec;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: #2a5298; }
  .input-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    align-items: stretch;
  }
  .btn-toggle {
    border: 3px solid #cdd8ec;
    background: #f0f3fa;
    color: #2a5298;
    border-radius: 10px;
    padding: 0 16px;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-toggle:active { background: #dbe4f5; }
  .btn-row {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  button {
    border: none;
    border-radius: 10px;
    padding: 12px 26px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }
  button:active { transform: scale(0.96); }
  .btn-submit {
    background: #2a5298;
    color: #fff;
  }
  .btn-submit:hover { opacity: 0.9; }
  .feedback {
    margin-top: 16px;
    font-size: 16px;
    font-weight: 600;
    min-height: 24px;
  }
  .feedback.correct { color: #22a559; }
  .feedback.wrong { color: #e04b4b; }
  .stats {
    margin-top: 20px;
    display: flex;
    justify-content: space-around;
    font-size: 13px;
    color: #888;
    border-top: 1px solid #eee;
    padding-top: 14px;
  }
  .stats b { color: #333; font-size: 16px; display: block; }
  .win-screen {
    display: none;
  }
  .win-screen.show {
    display: block;
  }
  .win-screen h2 {
    color: #22a559;
    font-size: 26px;
  }
  .win-screen p { color: #555; font-size: 14px; }
  .btn-restart {
    background: #22a559;
    color: #fff;
    margin-top: 16px;
  }
  .hidden { display: none !important; }
</style>
</head>

    <h1>整數加減練習</h1>
    <div class="sub">數字範圍 -9 ~ 9（不含0），連續答對 20 題才算過關</div>

    <div class="streak-bar">
      <div>
        <div class="streak-label">目前連續答對</div>
        <div class="streak-num" id="streakNum">0 <span>/ 20</span></div>
      </div>
      <div>
        <div class="streak-label">最佳連續紀錄</div>
        <div class="streak-num" id="bestNum">0</div>
      </div>
    </div>

    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="question" id="questionText">--</div>

    <div class="input-row">
      <button class="btn-toggle" id="toggleSignBtn" type="button">± 正負</button>
      <input type="text" id="answerInput" inputmode="numeric" placeholder="請輸入答案" autocomplete="off">
    </div>

    <div class="btn-row">
      <button class="btn-submit" id="submitBtn">送出答案</button>
    </div>

    <div class="feedback" id="feedback"></div>

    <div class="stats">
      <div><b id="totalCount">0</b>作答題數</div>
      <div><b id="correctCount">0</b>答對題數</div>
      <div><b id="wrongCount">0</b>答錯題數</div>
    </div>
  </div>

  <div class="win-screen" id="winScreen">
    <h2>🎉 恭喜過關！</h2>
    <p>你已經連續答對 20 題，太厲害了！</p>
    <p id="finalStats"></p>
    <button class="btn-restart" id="restartBtn">再玩一次</button>
  </div>

</div>

<script>
(function(){
  const MIN = -9, MAX = 9, GOAL = 20;

  let streak = 0;
  let best = 0;
  let total = 0;
  let correct = 0;
  let wrong = 0;
  let currentAnswer = 0;

  const streakNumEl = document.getElementById('streakNum');
  const bestNumEl = document.getElementById('bestNum');
  const progressFillEl = document.getElementById('progressFill');
  const questionEl = document.getElementById('questionText');
  const inputEl = document.getElementById('answerInput');
  const toggleSignBtn = document.getElementById('toggleSignBtn');
  const submitBtn = document.getElementById('submitBtn');
  const feedbackEl = document.getElementById('feedback');
  const totalEl = document.getElementById('totalCount');
  const correctEl = document.getElementById('correctCount');
  const wrongEl = document.getElementById('wrongCount');
  const playArea = document.getElementById('playArea');
  const winScreen = document.getElementById('winScreen');
  const restartBtn = document.getElementById('restartBtn');
  const finalStatsEl = document.getElementById('finalStats');

  function randInt(min, max) {
    // 排除 0，只取 -9~-1 或 1~9
    let n;
    do {
      n = Math.floor(Math.random() * (max - min + 1)) + min;
    } while (n === 0);
    return n;
  }

  function formatNum(n) {
    // 負數用括號包起來，避免跟運算符號混淆，例如 5 + (-3)
    return n < 0 ? `(${n})` : `${n}`;
  }

  function generateQuestion() {
    let a, b, op;
    while (true) {
      a = randInt(MIN, MAX);
      b = randInt(MIN, MAX);
      op = Math.random() < 0.5 ? '+' : '-';
      // 去掉「正整數 加 正整數」的組合（太簡單）
      if (op === '+' && a > 0 && b > 0) continue;
      break;
    }
    currentAnswer = op === '+' ? a + b : a - b;
    questionEl.textContent = `${formatNum(a)} ${op} ${formatNum(b)} = ?`;
    inputEl.value = '';
    feedbackEl.textContent = '';
    feedbackEl.className = 'feedback';
    inputEl.focus();
  }

  function updateStreakDisplay() {
    streakNumEl.innerHTML = `${streak} <span>/ ${GOAL}</span>`;
    bestNumEl.textContent = best;
    progressFillEl.style.width = `${(streak / GOAL) * 100}%`;
  }

  function updateStats() {
    totalEl.textContent = total;
    correctEl.textContent = correct;
    wrongEl.textContent = wrong;
  }

  function checkAnswer() {
    const raw = inputEl.value.trim();
    if (raw === '' || isNaN(raw)) {
      feedbackEl.textContent = '請輸入一個數字';
      feedbackEl.className = 'feedback wrong';
      return;
    }
    const userAnswer = parseInt(raw, 10);
    total++;

    if (userAnswer === currentAnswer) {
      correct++;
      streak++;
      if (streak > best) best = streak;
      feedbackEl.textContent = '答對了！';
      feedbackEl.className = 'feedback correct';
      updateStreakDisplay();
      updateStats();

      if (streak >= GOAL) {
        showWin();
        return;
      }
      setTimeout(generateQuestion, 500);
    } else {
      wrong++;
      streak = 0;
      feedbackEl.textContent = `答錯了，正確答案是 ${currentAnswer}`;
      feedbackEl.className = 'feedback wrong';
      updateStreakDisplay();
      updateStats();
      setTimeout(generateQuestion, 1200);
    }
  }

  function showWin() {
    playArea.classList.add('hidden');
    winScreen.classList.add('show');
    finalStatsEl.textContent = `共作答 ${total} 題，答對 ${correct} 題，答錯 ${wrong} 題`;
  }

  function restart() {
    streak = 0; total = 0; correct = 0; wrong = 0;
    updateStreakDisplay();
    updateStats();
    playArea.classList.remove('hidden');
    winScreen.classList.remove('show');
    generateQuestion();
  }

  toggleSignBtn.addEventListener('click', function() {
    const val = inputEl.value.trim();
    if (val === '') {
      inputEl.value = '-';
    } else if (val.startsWith('-')) {
      inputEl.value = val.slice(1);
    } else {
      inputEl.value = '-' + val;
    }
    inputEl.focus();
  });

  submitBtn.addEventListener('click', checkAnswer);
  inputEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkAnswer();
  });
  restartBtn.addEventListener('click', restart);

  // 初始化
  updateStreakDisplay();
  updateStats();
  generateQuestion();
})();
</script>

</body>
</html>
